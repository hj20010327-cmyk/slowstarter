<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUTO MES | 비밀번호 찾기</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/auth.css" />
</head>

<body class="auth-body">
    <div class="auth-wrap">
        <section class="auth-visual">
            <div><a href="./login.html" class="logo" style="color:#fff"><span class="logo-mark"
                        style="background:rgba(255,255,255,.18)">AM</span><span>AUTO MES</span></a>
                <h1>자동차 콤프레셔 제조 공장을 위한 MES</h1>
                <p>생산, 품질, 자재, 설비 정보를 한곳에서 관리하는 통합 시스템 샘플입니다.</p>
                <ul class="auth-bullets">
                    <li>작업지시와 생산실적을 빠르게 확인</li>
                    <li>불량 이력과 품질 현황 즉시 점검</li>
                    <li>재고 부족과 설비 상태를 한눈에 파악</li>
                </ul>
            </div>
            <p style="font-size:13px;color:rgba(255,255,255,.72)">AUTO MES Sample UI · 2026</p>
        </section>
        <section class="auth-card">
            <div class="auth-title">
                <h2>비밀번호 찾기</h2>
                <p>가입한 아이디와 이메일을 입력해 임시 비밀번호를 요청하세요.</p>
            </div>
            <form class="auth-form">
                <div class="auth-row"><label>아이디</label><input class="auth-input" type="text" placeholder="아이디 입력" />
                </div>
                <div class="auth-row"><label>이메일</label><input class="auth-input" type="email" placeholder="이메일 입력" />
                </div>
                <div class="auth-note">실제 프로젝트에서는 인증번호 전송 또는 관리자 승인 방식으로 연결하면 됩니다.</div><button class="auth-btn"
                    type="button">임시 비밀번호 요청</button>
                <div class="auth-links"><a href="./login.html">로그인</a><a href="./signup.html">회원가입</a></div>
            </form>
        </section>
    </div>
</body>

</html>
